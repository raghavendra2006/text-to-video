{% extends 'base.html' %}

{% block title %}Sign In - PIB Press Release to Video AI{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <i class="fa-solid fa-lock text-gradient lock-icon"></i>
            <h2>Welcome Back</h2>
            <p>Sign in to access the Video Studio</p>
        </div>
        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
            <div class="input-group">
                <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="input-group">
                <label for="password"><i class="fa-solid fa-key"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full glow-effect">
                <i class="fa-solid fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('signup') }}" class="text-gradient">Sign Up</a></p>
        </div>
    </div>
</div>
{% endblock %}
